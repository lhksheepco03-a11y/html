<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비에이텍과 함께하는 물 활용 캠페인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #0a1628;
      --color-primary: #1a9ea0;
      --color-primary-lt: #4ecdc4;
      --color-white: #ffffff;
      --color-text-muted: rgba(255, 255, 255, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--color-bg);
      color: var(--color-white);
      background-image: radial-gradient(circle at 50% 0%, rgba(26, 158, 160, 0.15) 0%, transparent 70%);
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-position: top center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* SECTION 1: Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid var(--color-primary);
    }

    .header-left {
      display: flex;
      flex-direction: column;
    }

    .header-logo {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .header-subtext {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-top: 4px;
    }

    .header-link {
      font-size: 14px;
      color: var(--color-text-muted);
      transition: color 0.3s;
    }
    
    .header-link:hover {
      color: var(--color-white);
    }

    /* SECTION 2: Hero Title */
    .hero {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .hero-main {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .hero-highlight {
      font-size: 44px;
      font-weight: 900;
      color: var(--color-primary-lt);
      margin-bottom: 16px;
    }

    .hero-sub {
      font-size: 16px;
      font-weight: 400;
      color: var(--color-text-muted);
      word-break: keep-all;
    }

    /* SECTION 3: Slider */
    .slider-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    .slider-container {
      position: relative;
      width: min(480px, 90vw);
      margin: 0 auto;
    }

    .slider-counter {
      position: absolute;
      top: -30px;
      right: 0;
      font-size: 14px;
      font-weight: 900;
      color: var(--color-primary-lt);
    }

    .slider-viewport {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      background-color: rgba(255, 255, 255, 0.02);
      position: relative;
    }

    .slider-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.4s ease-in-out;
      will-change: transform;
    }

    .slide {
      min-width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-color: var(--color-primary);
      border: none;
      color: var(--color-white);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      transition: transform 0.3s, opacity 0.3s, background-color 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .slider-btn:not(:disabled):hover {
      transform: translateY(-50%) scale(1.1);
      background-color: var(--color-primary-lt);
    }

    .slider-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-prev {
      left: -24px;
    }

    .btn-next {
      right: -24px;
    }

    .slider-dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 4px;
      background-color: var(--color-text-muted);
      cursor: pointer;
      transition: width 0.3s, background-color 0.3s;
    }

    .dot.active {
      width: 24px;
      background-color: var(--color-primary);
    }

    /* SECTION 4: Footer */
    footer {
      padding: 40px 20px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 20px;
    }

    .footer-company {
      font-size: 16px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .footer-slogan {
      font-size: 14px;
      color: var(--color-primary-lt);
      margin-bottom: 12px;
    }

    .footer-link {
      font-size: 14px;
      color: var(--color-text-muted);
      display: block;
      margin-bottom: 16px;
    }

    .footer-copy {
      font-size: 12px;
      color: var(--color-text-muted);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .slider-container {
        width: 420px;
      }
      .hero-main {
        font-size: 28px;
      }
      .hero-highlight {
        font-size: 36px;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 16px 20px;
      }
      .header-logo {
        font-size: 20px;
      }
      .header-link {
        font-size: 12px;
      }
      .hero-main {
        font-size: 24px;
      }
      .hero-highlight {
        font-size: 32px;
      }
      .hero-sub {
        font-size: 14px;
      }
      .slider-container {
        width: 90vw;
      }
      .slider-btn {
        width: 36px;
        height: 36px;
        font-size: 16px;
      }
      .btn-prev {
        left: -10px;
      }
      .btn-next {
        right: -10px;
      }
    }
  </style>
</head>
<body>

  <!-- SECTION 1: Header -->
  <header>
    <div class="header-left">
      <div class="header-logo">BEATEC</div>
      <div class="header-subtext">깨끗한 물, 지속 가능한 미래</div>
    </div>
    <a href="http://www.beatec.co.kr" class="header-link" target="_blank" rel="noopener noreferrer">www.beatec.co.kr</a>
  </header>

  <!-- SECTION 2: Hero Title -->
  <section class="hero">
    <h2 class="hero-main">비에이텍과 함께하는</h2>
    <h1 class="hero-highlight">물 활용 캠페인</h1>
    <p class="hero-sub">우리가 아끼는 물 한 방울이 다음 세대의 한 컵이 됩니다</p>
  </section>

  <!-- SECTION 3: Slider -->
  <section class="slider-section" aria-label="카드뉴스 슬라이더" role="region">
    <div class="slider-container">
      <div class="slider-counter"><span id="current-slide">1</span> / 7</div>
      
      <button class="slider-btn btn-prev" id="btn-prev" aria-label="이전 슬라이드" disabled>◀</button>
      
      <div class="slider-viewport" id="slider-viewport">
        <div class="slider-track" id="slider-track">
          <!-- 1번째 슬라이드 -->
          <div class="slide">
            <img src="./카드뉴스/카드뉴스1.png" alt="비에이텍 물 캠페인 카드뉴스 1" loading="lazy">
          </div>
          <!-- 2번째 슬라이드 -->
          <div class="slide">
            <img src="./카드뉴스/카드뉴스_2.png" alt="비에이텍 물 캠페인 카드뉴스 2" loading="lazy">
          </div>
          <!-- 3번째 슬라이드 -->
          <div class="slide">
            <img src="./카드뉴스/카드뉴스_3.png" alt="비에이텍 물 캠페인 카드뉴스 3" loading="lazy">
          </div>
          <!-- 4번째 슬라이드 -->
          <div class="slide">
            <img src="./카드뉴스/카드뉴스_4.png" alt="비에이텍 물 캠페인 카드뉴스 4" loading="lazy">
          </div>
          <!-- 5번째 슬라이드 -->
          <div class="slide">
            <img src="./카드뉴스/카드뉴스_5.png" alt="비에이텍 물 캠페인 카드뉴스 5" loading="lazy">
          </div>
          <!-- 6번째 슬라이드 -->
          <div class="slide">
            <img src="./카드뉴스/카드뉴스_6.png" alt="비에이텍 물 캠페인 카드뉴스 6" loading="lazy">
          </div>
          <!-- 7번째 슬라이드 -->
          <div class="slide">
            <img src="./카드뉴스/카드뉴스_7.png" alt="비에이텍 물 캠페인 카드뉴스 7" loading="lazy">
          </div>
        </div>
      </div>

      <button class="slider-btn btn-next" id="btn-next" aria-label="다음 슬라이드">▶</button>
      
      <div class="slider-dots" id="slider-dots">
        <div class="dot active" data-index="0" aria-label="1번 슬라이드로 이동"></div>
        <div class="dot" data-index="1" aria-label="2번 슬라이드로 이동"></div>
        <div class="dot" data-index="2" aria-label="3번 슬라이드로 이동"></div>
        <div class="dot" data-index="3" aria-label="4번 슬라이드로 이동"></div>
        <div class="dot" data-index="4" aria-label="5번 슬라이드로 이동"></div>
        <div class="dot" data-index="5" aria-label="6번 슬라이드로 이동"></div>
        <div class="dot" data-index="6" aria-label="7번 슬라이드로 이동"></div>
      </div>
    </div>
  </section>

  <!-- SECTION 4: Footer -->
  <footer>
    <div class="footer-company">비에이텍(주) / BEATEC</div>
    <div class="footer-slogan">깨끗한 물, 믿음직한 펌프</div>
    <a href="http://www.beatec.co.kr" class="footer-link" target="_blank" rel="noopener noreferrer">www.beatec.co.kr</a>
    <div class="footer-copy">ⓒ 2025 BEATEC. All rights reserved.</div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const track = document.getElementById('slider-track');
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');
      const currentSlideEl = document.getElementById('current-slide');
      const dots = document.querySelectorAll('.dot');
      const viewport = document.getElementById('slider-viewport');
      
      const totalSlides = 7;
      let currentIndex = 0;
      
      // 드래그/터치 상태 변수
      let startX = 0;
      let currentTranslate = 0;
      let prevTranslate = 0;
      let isDragging = false;
      let movedPx = 0;

      function updateSlider(index) {
        if (index < 0) index = 0;
        if (index >= totalSlides) index = totalSlides - 1;
        
        currentIndex = index;
        
        // CSS 트랜지션 적용 및 위치 이동
        track.style.transition = 'transform 0.4s ease-in-out';
        track.style.transform = `translateX(-${currentIndex * 100}%)`;
        
        // UI 업데이트
        currentSlideEl.textContent = currentIndex + 1;
        
        btnPrev.disabled = currentIndex === 0;
        btnNext.disabled = currentIndex === totalSlides - 1;
        
        dots.forEach((dot, i) => {
          dot.classList.toggle('active', i === currentIndex);
        });
      }

      // 버튼 이벤트
      btnPrev.addEventListener('click', () => {
        if (currentIndex > 0) updateSlider(currentIndex - 1);
      });

      btnNext.addEventListener('click', () => {
        if (currentIndex < totalSlides - 1) updateSlider(currentIndex + 1);
      });

      // 인디케이터(점) 이벤트
      dots.forEach(dot => {
        dot.addEventListener('click', (e) => {
          const index = parseInt(e.target.getAttribute('data-index'), 10);
          updateSlider(index);
        });
      });

      // 키보드 지원
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' && currentIndex > 0) {
          updateSlider(currentIndex - 1);
        } else if (e.key === 'ArrowRight' && currentIndex < totalSlides - 1) {
          updateSlider(currentIndex + 1);
        }
      });

      // 마우스 및 터치 드래그 지원
      viewport.addEventListener('touchstart', touchStart);
      viewport.addEventListener('touchmove', touchMove, { passive: true });
      viewport.addEventListener('touchend', touchEnd);

      viewport.addEventListener('mousedown', touchStart);
      viewport.addEventListener('mousemove', touchMove);
      viewport.addEventListener('mouseup', touchEnd);
      viewport.addEventListener('mouseleave', () => {
        if (isDragging) touchEnd();
      });

      function touchStart(e) {
        isDragging = true;
        startX = getPositionX(e);
        prevTranslate = -currentIndex * viewport.clientWidth;
        currentTranslate = prevTranslate;
        movedPx = 0;
        
        // 드래그 중에는 애니메이션 제거
        track.style.transition = 'none';
      }

      function touchMove(e) {
        if (!isDragging) return;
        const currentPosition = getPositionX(e);
        movedPx = currentPosition - startX;
        currentTranslate = prevTranslate + movedPx;
        track.style.transform = `translateX(${currentTranslate}px)`;
      }

      function touchEnd() {
        if (!isDragging) return;
        isDragging = false;
        
        // 드래그 거리가 50px 이상이면 다음/이전 슬라이드로 넘어감
        if (movedPx < -50 && currentIndex < totalSlides - 1) {
          updateSlider(currentIndex + 1);
        } else if (movedPx > 50 && currentIndex > 0) {
          updateSlider(currentIndex - 1);
        } else {
          updateSlider(currentIndex); // 제자리 복귀
        }
      }

      function getPositionX(e) {
        return e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
      }
    });
  </script>
</body>
</html>
